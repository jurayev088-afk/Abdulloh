<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telefon — PhoneShop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
  <style>
    .detail-layout {
      display: grid; grid-template-columns: 1fr 1fr; gap: 40px;
      align-items: start;
    }
    .detail-img-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 48px;
      display: flex; align-items: center; justify-content: center;
      min-height: 400px;
    }
    .detail-mockup {
      width: 140px; height: 260px; border-radius: 24px;
      border: 4px solid rgba(255,255,255,.12);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      box-shadow: 0 20px 60px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.1);
      position: relative;
    }
    .detail-mockup::before {
      content:''; position:absolute; top:14px;
      width:40px; height:6px; background:rgba(255,255,255,.2); border-radius:3px;
    }
    .detail-mockup::after {
      content:''; position:absolute; bottom:12px;
      width:40px; height:5px; background:rgba(255,255,255,.12); border-radius:3px;
    }
    .detail-brand-icon { font-size: 48px; }
    .detail-info { padding: 8px 0; }
    .detail-brand { font-size: 13px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .detail-name { font-size: 32px; font-weight: 800; line-height: 1.1; margin-bottom: 16px; letter-spacing: -0.5px; }
    .detail-price { font-size: 30px; font-weight: 800; color: var(--accent2); margin-bottom: 6px; }
    .detail-old-price { font-size: 16px; color: var(--text-dim); text-decoration: line-through; margin-bottom: 20px; }
    .detail-desc { font-size: 15px; color: var(--text-muted); line-height: 1.7; margin-bottom: 24px; }
    .qty-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .qty-btn {
      width: 36px; height: 36px; border-radius: 8px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-family: inherit; transition: all .15s;
    }
    .qty-btn:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent2); }
    .qty-val { font-size: 18px; font-weight: 700; min-width: 28px; text-align: center; }
    .add-btns { display: flex; gap: 12px; margin-bottom: 28px; }
    .specs-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0;
    }
    .spec-row {
      display: flex; flex-direction: column; gap: 4px;
      padding: 14px 0; border-bottom: 1px solid var(--border);
    }
    .spec-row:nth-child(odd) { padding-right: 20px; }
    .spec-row:nth-child(even) { padding-left: 20px; border-left: 1px solid var(--border); }
    .spec-key { font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: .5px; }
    .spec-val { font-size: 14px; font-weight: 600; }
    @media (max-width: 768px) {
      .detail-layout { grid-template-columns: 1fr; }
      .specs-grid { grid-template-columns: 1fr; }
      .spec-row:nth-child(even) { padding-left: 0; border-left: none; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a class="logo" href="/store/">Phone<span>Shop</span></a>
    <nav class="nav">
      <a href="/phone-store/index.html">Bosh sahifa</a>
      <a href="./phones.html">Telefonlar</a>
      <a href="./cart.html">Savat</a>
    </nav>
    <div class="header-right">
      <a class="cart-btn" href="./cart.html">🛒 Savat <span class="cart-count" id="cart-count">0</span></a>
    </div>
  </div>
</header>

<main class="main">
  <div class="breadcrumb">
    <a href="/phone-store/index.html">Bosh sahifa</a><span>›</span>
    <a href="./phones.html">Telefonlar</a><span>›</span>
    <span id="bc-name">...</span>
  </div>

  <div id="content">
    <div class="loading"><div class="spinner"></div><br>Yuklanmoqda...</div>
  </div>
</main>

<footer class="footer">
  <div class="footer-inner">
    <div class="footer-bottom">© 2026 PhoneShop. Barcha huquqlar himoyalangan.</div>
  </div>
</footer>

<div id="toast-wrap"></div>

<script type="module">
import { addToCart, updateCartCount, formatPrice, brandIcon, toast } from '../js/cart.js';

const API = '/api';
const id = new URLSearchParams(location.search).get('id');
let phone = null;
let qty = 1;

async function load() {
  if (!id) { location.href = 'phones.html'; return; }
  try {
    phone = await fetch(`${API}/phones/${id}`).then(r => { if(!r.ok) throw new Error(); return r.json(); });
    document.title = `${phone.brand} ${phone.name} — PhoneShop`;
    document.getElementById('bc-name').textContent = `${phone.brand} ${phone.name}`;
    render();
  } catch {
    document.getElementById('content').innerHTML = '<div class="empty"><div class="empty-icon">😕</div>Telefon topilmadi. <a href="phones.html" style="color:var(--accent2)">Katalogga qaytish</a></div>';
  }
}

function render() {
  const icon = brandIcon(phone.brand);
  const discount = phone.oldPrice ? Math.round((1 - parseFloat(phone.price)/parseFloat(phone.oldPrice)) * 100) : 0;

  document.getElementById('content').innerHTML = `
    <div class="detail-layout">
      <div>
        <div class="detail-img-box">
          <div class="detail-mockup" style="background:linear-gradient(145deg,${phone.color},${phone.color}aa)">
            <span class="detail-brand-icon">${icon}</span>
          </div>
        </div>
        ${phone.stock < 5 ? `<div style="margin-top:12px;text-align:center"><span class="badge badge-yellow">⚠️ Qoldi: ${phone.stock} dona</span></div>` : ''}
      </div>

      <div class="detail-info">
        <div class="detail-brand">${phone.brand}</div>
        <h1 class="detail-name">${phone.name}</h1>

        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <div class="detail-price">${formatPrice(phone.price)}</div>
          ${discount ? `<span class="badge badge-red">-${discount}%</span>` : ''}
        </div>
        ${phone.oldPrice ? `<div class="detail-old-price">${formatPrice(phone.oldPrice)}</div>` : ''}

        <p class="detail-desc">${phone.description}</p>

        <div class="qty-row">
          <span style="font-size:14px;color:var(--text-muted);font-weight:500">Miqdor:</span>
          <button class="qty-btn" id="qty-minus">−</button>
          <span class="qty-val" id="qty-val">1</span>
          <button class="qty-btn" id="qty-plus">+</button>
        </div>

        <div class="add-btns">
          <button class="btn btn-primary" style="flex:1" id="add-btn">🛒 Savatga qo'shish</button>
          <a class="btn btn-secondary" href="cart.html">Savatni ko'rish</a>
        </div>

        <div style="display:flex;gap:16px;margin-bottom:28px;font-size:13px;color:var(--text-muted)">
          <span>✅ Original kafolat</span>
          <span>🚚 Tez yetkazib berish</span>
          <span>🔄 14 kun qaytarish</span>
        </div>

        <div class="card" style="padding:20px">
          <div style="font-size:15px;font-weight:700;margin-bottom:16px">Texnik xususiyatlar</div>
          <div class="specs-grid">
            <div class="spec-row"><div class="spec-key">Displey</div><div class="spec-val">${phone.display}</div></div>
            <div class="spec-row"><div class="spec-key">Kamera</div><div class="spec-val">${phone.camera}</div></div>
            <div class="spec-row"><div class="spec-key">RAM</div><div class="spec-val">${phone.ram}</div></div>
            <div class="spec-row"><div class="spec-key">Xotira</div><div class="spec-val">${phone.storage}</div></div>
            <div class="spec-row"><div class="spec-key">Batareya</div><div class="spec-val">${phone.battery}</div></div>
            <div class="spec-row"><div class="spec-key">Operatsion tizim</div><div class="spec-val">${phone.os}</div></div>
          </div>
        </div>
      </div>
    </div>`;

  document.getElementById('qty-minus').addEventListener('click', () => {
    if (qty > 1) { qty--; document.getElementById('qty-val').textContent = qty; }
  });
  document.getElementById('qty-plus').addEventListener('click', () => {
    qty++; document.getElementById('qty-val').textContent = qty;
  });
  document.getElementById('add-btn').addEventListener('click', () => {
    addToCart(phone, qty);
    toast(`${phone.brand} ${phone.name} savatga qo'shildi (${qty} dona)`);
  });
}

load();
</script>
</body>
</html>
