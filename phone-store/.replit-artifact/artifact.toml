kind = "web"
previewPath = "/store/"
title = "Phone Store"
version = "1.0.0"
id = "artifacts/phone-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/store/" ]
localPort = 21159

[services.development]
run = "pnpm --filter @workspace/phone-store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/phone-store", "run", "build" ]
publicDir = "artifacts/phone-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21159"
BASE_PATH = "/store/"